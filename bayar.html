<!DOCTYPE html>
<html lang="id">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>CakraPlayStore</title>
  
  <link rel="stylesheet" href="style.css" />
  <link href="https://fonts.googleapis.com/icon?family=Material+Icons" rel="stylesheet">

  <div class="sidebar">
    <a href="index.html" class="menu"><span class="material-icons">home</span><p>Home</p></a>
    <a href="tf.html" class="menu"><span class="material-icons">description</span><p>Transaksi</p></a>
    <a href="kupon.html" class="menu"><span class="material-icons">local_offer</span><p>Kupon</p></a>
    <a href="hdh.html" class="menu"><span class="material-icons">card_giftcard</span><p>Hadiahku</p></a>
  </div>

  <div id="particles-js"></div>

  <header class="navbar">
    <div class="navbar-container">
      <div class="spacer"></div>
      <div class="logo"><img src="logo.png" alt="CakraPlayStore" /></div>
      <div class="spacer"></div>
      <div class="search-login">
        <span class="material-icons search-icon">search</span>
        <input type="text" id="searchInput" placeholder="Cari Game..." />
        <span class="material-icons clear-icon" id="clearSearch">close</span>
        <div id="searchResult" class="search-result"></div>
      </div>
      <div class="spacer"></div>
    </div>
  </header>

  <div class="user-icon">
    <span class="material-icons">person</span>
  </div>

  <footer class="footer">
    ©2026 CakraPlayStore
  </footer>

  <script src="https://cdn.jsdelivr.net/npm/particles.js"></script>
  <script>
    particlesJS("particles-js", {
      particles: {
        number: { value: 80 },
        color: { value: "#000000" },
        shape: { type: "circle" },
        opacity: { value: 0.5 },
        size: { value: 3 },
        line_linked: { enable: true, distance: 150, color: "#000000", opacity: 0.4, width: 1 },
        move: { enable: true, speed: 2 }
      }
    });
  </script>
</body>
</html>
