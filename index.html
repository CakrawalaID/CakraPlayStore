    </div>

    <div class="card" data-name="genshin impact" onclick="goToPage('gi.html')">
      <img src="gi.jpg"><p>Genshin Impact</p>
    </div>

    <div class="card" data-name="honkai star rail" onclick="goToPage('hsr.html')">
      <img src="hsr.jpg"><p>Honkai: Star Rail</p>
    </div>
  </div>
</div>

  <div class="topup-cards">
    <div class="card" data-name="honor of kings" onclick="goToPage('hok.html')">
      <img src="hok.jpg"><p>Honor Of Kings</p>
    </div>

    </div>

<div class="user-icon">
  <span class="material-icons">person</span>
</div>

<script src="https://cdn.jsdelivr.net/npm/particles.js"></script>
<script>
particlesJS("particles-js", {
  particles: {
    number: { value: 80 },
    color: { value: "#000000" },
    shape: { type: "circle" },
    opacity: { value: 0.5 },
    size: { value: 3 },
    line_linked: {
      enable: true,
      distance: 150,
      color: "#000000",
      opacity: 0.4,
      width: 1
    },
    move: { enable: true, speed: 2 }
  }
});
</script>

<script>
let slideIndex = 1;
showSlides(slideIndex);

function plusSlides(n){
  showSlides(slideIndex += n);
}

function showSlides(n){
  let slides = document.getElementsByClassName("slide");

  if(n > slides.length){slideIndex = 1}
  if(n < 1){slideIndex = slides.length}

  for(let i = 0; i < slides.length; i++){
    slides[i].style.display = "none";
  }

  slides[slideIndex-1].style.display = "block";
}

setInterval(()=>{ plusSlides(1); },4000);
</script>

<!-- SEARCH FINAL dengan CLEAR ICON -->
<script>
const searchInput = document.getElementById("searchInput");
const resultBox = document.getElementById("searchResult");
const cards = document.querySelectorAll(".card");
const clearIcon = document.getElementById("clearSearch");

searchInput.addEventListener("keyup", function() {
    const keyword = this.value.toLowerCase();
    resultBox.innerHTML = "";

    clearIcon.style.display = keyword ? "block" : "none";

    if (keyword === "") {
        resultBox.style.display = "none";
        cards.forEach(c => c.style.display = "flex");
        return;
    }

    cards.forEach(card => {
        const name = card.getAttribute("data-name");

        if (name.includes(keyword)) {
            const item = document.createElement("div");
            item.classList.add("search-item");
            item.innerText = name;

            item.onclick = () => {
                cards.forEach(c => c.style.display = "none");
                card.style.display = "flex";

                card.scrollIntoView({ behavior: "smooth" });
                resultBox.style.display = "none";
            };

            resultBox.appendChild(item);
        }
    });

    resultBox.style.display = "block";
});

// tombol clear search
clearIcon.addEventListener("click", () => {
    searchInput.value = "";
    resultBox.style.display = "none";
    clearIcon.style.display = "none";
    cards.forEach(c => c.style.display = "flex");
    searchInput.focus();
});
</script>

</body>
</html>
