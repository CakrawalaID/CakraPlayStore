<!DOCTYPE html>
<html>
<head>
    <title>CakraPlayStore</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    
<div id="particles-js"></div>

<script src="https://cdn.jsdelivr.net/npm/particles.js"></script>

<script>
particlesJS("particles-js", {
  particles: {
    number: { value: 80 },
    color: { value: "#000000" },
    shape: { type: "circle" },
    opacity: { value: 0.5 },
    size: { value: 3 },
    line_linked: {
      enable: true,
      distance: 150,
      color: "#000000",
      opacity: 0.4,
      width: 1
    },
    move: { enable: true, speed: 2 }
  }
});
</script>

<header class="navbar">

    <div class="nav-left">
        <h2 class="brand">MyTopUp</h2>
    </div>

    <div class="nav-center">
        <input type="text" placeholder="Cari game, layanan..." class="search-input">

    <div class="nav-right">
        <button class="login">Masuk</button>
    </div>

</header>
