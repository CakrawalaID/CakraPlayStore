<!DOCTYPE html>
<html>
<head>
    <title>CakraPlayStore</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    
<div id="particles-js"></div>

<script src="https://cdn.jsdelivr.net/npm/particles.js"></script>

<script>
particlesJS("particles-js", {
  particles: {
    number: { value: 80 },
    color: { value: "#000000" },
    shape: { type: "circle" },
    opacity: { value: 0.5 },
    size: { value: 3 },
    line_linked: {
      enable: true,
      distance: 150,
      color: "#000000",
      opacity: 0.4,
      width: 1
    },
    move: { enable: true, speed: 2 }
  }
});
</script>

<nav class="navbar">
    <div class="logo">
        <!-- Ganti teks ini dengan gambar logo kalau mau -->
        <a href="#">MyTopUp</a>
    </div>

    <div class="search-box">
        <input type="text" placeholder="Cari game, layanan...">
        <span class="search-icon">🔍</span>
    </div>

    <div class="nav-btn">
        <a href="#" class="btn-daftar">Daftar</a>
    </div>
</nav>
