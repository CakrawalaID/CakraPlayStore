<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1" />
<title>CakraPlayStore</title>
<link rel="stylesheet" href="style.css" />

<!-- MATERIAL ICONS -->
<link href="https://fonts.googleapis.com/icon?family=Material+Icons" rel="stylesheet">

</head>
<body>

<!-- Sidebar -->
<div class="sidebar">

  <a href="#" class="menu active">
    <span class="material-icons">home</span>
    <p>Home</p>
  </a>

  <a href="#" class="menu">
    <span class="material-icons">description</span>
    <p>Transaksi</p>
  </a>

  <a href="#" class="menu">
    <span class="material-icons">local_offer</span>
    <p>Promo</p>
  </a>

  <a href="#" class="menu">
    <span class="material-icons">card_giftcard</span>
    <p>Hadiahku</p>
  </a>

</div>

<!-- Background Particles -->
<div id="particles-js"></div>

<!-- Navbar -->
<header class="navbar">
  <div class="navbar-container">
    <div class="spacer"></div>

    <!-- Logo -->
    <div class="logo">
      <img src="logo.png" alt="CakraPlayStore" />
    </div>

    <div class="spacer"></div>

    <!-- Search -->
    <div class="search-login">
      <span class="material-icons search-icon">search</span>
      <input type="text" placeholder="Cari Game..." />
    </div>

    <div class="spacer"></div>
  </div>
</header>

<!-- SLIDER BANNER -->
<div class="slider-container">

  <div class="slide fade">
    <img src="banner1.jpg" alt="Promo 1">
  </div>

  <div class="slide fade">
    <img src="banner2.jpg" alt="Promo 2">
  </div>

  <div class="slide fade">
    <img src="banner3.jpg" alt="Promo 3">
  </div>

  <!-- tombol slider -->
  <a class="prev" onclick="plusSlides(-1)">❮</a>
  <a class="next" onclick="plusSlides(1)">❯</a>

</div>

<!-- Card Top-Up Section -->
<div class="main-content">
  <h2 class="section-title">
    <span class="material-icons title-icon">whatshot</span> Populer
  </h2>

  <!-- CARD GRID -->
  <div class="topup-cards">

    <div class="card">
      <img src="ml.jpg">
      <p>Mobile Legends: Bang Bang</p>
    </div>

    <div class="card">
      <img src="ff.jpg">
      <p>Free Fire</p>
    </div>

    <div class="card">
      <img src="rb.jpg">
      <p>Roblox</p>
    </div>

    <div class="card">
      <img src="gi.jpg">
      <p>Genshin Impact</p>
    </div>

    <div class="card">
      <img src="hsr.jpg">
      <p>Honkai: Star Rail</p>
    </div>

  </div>
</div>

    <div class="card">
      <img src="steam.jpg">
      <p>Steam Wallet Voucher</p>
    </div>

    <div class="card">
      <img src="play.jpg">
      <p>Play Store Voucher</p>
    </div>
  
  </div> 
</div>
  
<!-- User Icon -->
<div class="user-icon">
  <span class="material-icons">person</span>
</div>

<!-- PARTICLES SCRIPT -->
<script src="https://cdn.jsdelivr.net/npm/particles.js"></script>
<script>
particlesJS("particles-js", {
  particles: {
    number: { value: 80 },
    color: { value: "#000000" },
    shape: { type: "circle" },
    opacity: { value: 0.5 },
    size: { value: 3 },
    line_linked: {
      enable: true,
      distance: 150,
      color: "#000000",
      opacity: 0.4,
      width: 1
    },
    move: { enable: true, speed: 2 }
  }
});
</script>

<!-- SLIDER SCRIPT -->
<script>

let slideIndex = 1;
showSlides(slideIndex);

function plusSlides(n){
  showSlides(slideIndex += n);
}

function showSlides(n){
  let i;
  let slides = document.getElementsByClassName("slide");

  if(n > slides.length){slideIndex = 1}
  if(n < 1){slideIndex = slides.length}

  for(i = 0; i < slides.length; i++){
    slides[i].style.display = "none";
  }

  slides[slideIndex-1].style.display = "block";
}

/* auto slide */
setInterval(()=>{
  plusSlides(1);
},4000);

</script>

</body>
</html>
