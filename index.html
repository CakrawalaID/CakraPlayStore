<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1" />
<title>CakraPlayStore</title>
<link rel="stylesheet" href="style.css" />
</head>
<body>

<!-- Sidebar -->
<div class="sidebar">

  <a href="#" class="menu active">
    <span>🏠</span>
    <p>Home</p>
  </a>

  <a href="#" class="menu">
    <span>📄</span>
    <p>Transaksi</p>
  </a>

  <a href="#" class="menu">
    <span>🏷️</span>
    <p>Promo</p>
  </a>

  <a href="#" class="menu">
    <span>🎁</span>
    <p>Hadiahku</p>
  </a>

</div>

<!-- Background Particles -->
<div id="particles-js"></div>

<!-- Navbar -->
<header class="navbar">
  <div class="navbar-container">
    <div class="spacer"></div>

    <!-- Logo -->
    <div class="logo">
      <img src="logo.png" alt="CakraPlayStore" />
    </div>

    <div class="spacer"></div>

    <!-- Search + Daftar -->
    <div class="search-login">
      <input type="text" placeholder="Cari Game..." />
      <button class="login-btn">Daftar</button>
    </div>

    <div class="spacer"></div>
  </div>
</header>

<!-- SLIDER BANNER -->
<div class="slider-container">

  <div class="slide fade">
    <img src="banner1.jpg" alt="Promo 1">
  </div>

  <div class="slide fade">
    <img src="banner2.jpg" alt="Promo 2">
  </div>

  <div class="slide fade">
    <img src="banner3.jpg" alt="Promo 3">
  </div>

  <!-- tombol slider -->
  <a class="prev" onclick="plusSlides(-1)">❮</a>
  <a class="next" onclick="plusSlides(1)">❯</a>

</div>

<!-- User Icon -->
<div class="user-icon">
  <span>👤</span>
</div>

<!-- PARTICLES SCRIPT -->
<script src="https://cdn.jsdelivr.net/npm/particles.js"></script>
<script>
particlesJS("particles-js", {
  particles: {
    number: { value: 80 },
    color: { value: "#000000" },
    shape: { type: "circle" },
    opacity: { value: 0.5 },
    size: { value: 3 },
    line_linked: {
      enable: true,
      distance: 150,
      color: "#000000",
      opacity: 0.4,
      width: 1
    },
    move: { enable: true, speed: 2 }
  }
});
</script>

<!-- SLIDER SCRIPT -->
<script>

let slideIndex = 1;
showSlides(slideIndex);

function plusSlides(n){
  showSlides(slideIndex += n);
}

function showSlides(n){
  let i;
  let slides = document.getElementsByClassName("slide");

  if(n > slides.length){slideIndex = 1}
  if(n < 1){slideIndex = slides.length}

  for(i = 0; i < slides.length; i++){
    slides[i].style.display = "none";
  }

  slides[slideIndex-1].style.display = "block";
}

/* auto slide */
setInterval(()=>{
  plusSlides(1);
},4000);

</script>

</body>
</html>
