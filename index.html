<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>CakraPlayStore</title>
<link rel="stylesheet" href="style.css">
</head>
<body>

<div id="particles-js"></div>

<header class="navbar">
  <div class="navbar-container">

    <!-- Logo kiri -->
    <div class="logo">
      <img src="logo.png" alt="logo">
    </div>

    <!-- Spacer tengah -->
    <div class="spacer"></div>

    <!-- Search + Daftar -->
    <div class="search-login">
      <input type="text" placeholder="Cari Game...">
      <button class="login-btn">Daftar</button>
    </div>

  </div>
</header>

<script src="https://cdn.jsdelivr.net/npm/particles.js"></script>
<script>
particlesJS("particles-js", {
  particles: {
    number: { value: 80 },
    color: { value: "#000000" },
    shape: { type: "circle" },
    opacity: { value: 0.5 },
    size: { value: 3 },
    line_linked: {
      enable: true,
      distance: 150,
      color: "#000000",
      opacity: 0.4,
      width: 1
    },
    move: { enable: true, speed: 2 }
  }
});
</script>

</body>
</html>
