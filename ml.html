<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Top Up ML | CakraPlayStore</title>

<link href="https://fonts.googleapis.com/icon?family=Material+Icons" rel="stylesheet">

<style>
body{font-family:sans-serif;background:#f5f5f5;margin:0}
.container{max-width:900px;margin:40px auto;background:#fff;padding:20px;border-radius:10px}
.topup-item,.payment-method{
  border:1px solid #ddd;
  padding:12px;
  margin:5px;
  cursor:pointer;
  border-radius:8px;
}
.active{border:2px solid #ff5722;background:#fff3f0}
.disabled{opacity:.4;pointer-events:none}
button{padding:15px;background:#ff5722;color:#fff;border:none;border-radius:8px;width:100%;cursor:pointer}
</style>
</head>

<body>

<div class="container">

<h2>Top Up Mobile Legends</h2>

<input type="text" id="user-id" placeholder="User ID"><br><br>
<input type="text" id="server-id" placeholder="Server ID"><br><br>

<h3>Pilih Diamond</h3>
<div id="denom" class="disabled">
  <div class="topup-item">5 Diamonds<br><small>Rp1.381</small></div>
  <div class="topup-item">10 Diamonds<br><small>Rp3.002</small></div>
  <div class="topup-item">15 Diamonds<br><small>Rp4.502</small></div>
</div>

<h3>Pilih Pembayaran</h3>
<div id="payment" class="disabled">
  <div class="payment-method">QRIS</div>
  <div class="payment-method">Virtual Account</div>
</div>

<br>
<button id="buy">Beli Sekarang</button>

</div>

<script>

// unlock
const user = document.getElementById("user-id");
const server = document.getElementById("server-id");
const denom = document.getElementById("denom");
const payment = document.getElementById("payment");

user.addEventListener("input", ()=>{
  if(user.value.length>=5){
    denom.classList.remove("disabled");
    payment.classList.remove("disabled");
  } else {
    denom.classList.add("disabled");
    payment.classList.add("disabled");
  }
});

// select
function aktifkan(selector){
  document.querySelectorAll(selector).forEach(el=>{
    el.onclick=()=>{
      document.querySelectorAll(selector).forEach(i=>i.classList.remove("active"));
      el.classList.add("active");
    }
  })
}
aktifkan(".topup-item");
aktifkan(".payment-method");

// buy
document.getElementById("buy").onclick=()=>{

  const d = document.querySelector(".topup-item.active");
  const p = document.querySelector(".payment-method.active");

  if(!d || !p){
    alert("Pilih dulu!");
    return;
  }

  if(user.value.length<5 || server.value.length<2){
    alert("ID tidak valid!");
    return;
  }

  const item = d.innerHTML.split("<br>")[0];
  const harga = d.querySelector("small").innerText;
  const via = p.innerText;

  window.location.href =
  `bayar.html?id=${user.value}&server=${server.value}&item=${item}&harga=${harga}&via=${via}&game=Mobile Legends&img=ml.jpg`;
}

</script>

</body>
</html>
