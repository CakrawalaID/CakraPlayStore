<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Mobile Legends</title>
<link rel="stylesheet" href="../../style.css"> <!-- CSS utama -->
<style>
    /* Background halaman */
    body {
        margin: 0;
        padding: 0;
        font-family: 'Poppins', sans-serif;
        height: 100vh;
        background: linear-gradient(135deg, #1f2937, #4f46e5); /* biru ke gelap */
        display: flex;
        justify-content: center;
        align-items: center;
        color: white;
    }

    /* Container utama */
    .game-background {
        width: 90%;
        max-width: 800px;
        padding: 40px;
        border-radius: 20px;
        background: rgba(0,0,0,0.6); /* transparan gelap */
        text-align: center;
        box-shadow: 0 8px 20px rgba(0,0,0,0.3);
    }

    /* Judul game */
    .game-background h1 {
        margin-bottom: 30px;
        font-size: 36px;
        color: #ffcc00; /* warna emas */
    }

    /* Gambar cover */
    .game-background img {
        max-width: 100%;
        border-radius: 12px;
        margin-bottom: 30px;
    }
</style>
</head>
<body>

<div class="game-background">
    <h1>Mobile Legends</h1>
    <img src="ml.jpg" alt="Mobile Legends Cover">
</div>

</body>
</html>
